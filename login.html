DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - VIP Football Predictions</title>

<style>
body{
    margin:0;
    background:#0d1117;
    font-family:Arial,sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:90%;
    max-width:380px;
    background:#161b22;
    padding:30px;
    border-radius:15px;
    border:2px solid gold;
}

h2{
    text-align:center;
    color:gold;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:gold;
    color:black;
    border:none;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

p{
    text-align:center;
}

a{
    color:gold;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="login-box">

<h2>👑 VIP Login</h2>

<input type="email" placeholder="Email Address">

<input type="password" placeholder="Password">

<button>Login</button>

<p>
Don't have an account?<br>
<a href="register.html">Create Account</a>
</p>

</div>
<script type="module" src="login.js"></script>
</body>
</html>
